name: Waka Readme

on:
  schedule:
    # Runs at 12am IST
    - cron: '30 18 * * *'
  workflow_dispatch:
jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - name: Wait for WakaTime stats to be ready
        id: waka
        run: |
          for i in $(seq 1 5); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              "https://wakatime.com/api/v1/users/current/stats/last_7_days?api_key=${{ secrets.WAKATIME_API_KEY }}")
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && { echo "ready=true" >> "$GITHUB_OUTPUT"; exit 0; }
            sleep 30
          done
          # not ready (e.g. 202 still generating): skip so we don't overwrite the README with nothing
          echo "ready=false" >> "$GITHUB_OUTPUT"
      - if: steps.waka.outputs.ready == 'true'
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_UPDATED_DATE: "False"
          SHOW_LINES_OF_CODE: "True"
          SHOW_TOTAL_CODE_TIME: "True"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE: "True"
          SHOW_OS: "True"
          SHOW_PROJECTS: "False"
          SHOW_TIMEZONE: "False"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_LOC_CHART: "False"
          SYMBOL_VERSION: "2"
